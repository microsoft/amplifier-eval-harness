# Smoke config — inner-dev-loop
#
# 1 bundle × 1 scenario × 1 run. Smallest end-to-end check.
#
# Run:
#   amplifier-eval-harness run --config configs/smoke.yaml

profile: ../profiles/eval-base.yaml.tmpl

# Sequential (parallelism=1) for the smoke run; switch to >1 for matrix runs.
parallelism: 1

launch_timeout_s: 600
exec_timeout_s: 600

keep_dtu_on_failure: true
keep_dtu_on_success: false

# Provider/model overlay deep-merged into the container's ~/.amplifier/settings.yaml.
# default-providers.yaml is lifted from the user's actual ~/.amplifier/settings.yaml
# (minus chat-completions, which is local-only).
settings_overlay: ../settings/default-providers.yaml

bundles:
  - name: foundation
    source: git+https://github.com/microsoft/amplifier-foundation@main

scenarios:
  - explain-repo

runs_per_combo: 1
