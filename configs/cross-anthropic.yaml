# cross-anthropic — cross-bundle smoke on the Anthropic stack
#
# 5 bundles x 3 representative scenarios x 1 run = 15 runs (~25-35 min
# wall at parallelism=2). Mate of configs/cross-openai.yaml so the two
# distributions plug directly side-by-side.
#
# Scenario set is deliberately a mix from "originals" to "most advanced"
# so the smoke gives breadth on capability profile:
#   - explain-repo       file reading + summarization (smallest)
#   - fix-failing-test   debug loop (read → identify → edit → verify)
#   - spec-driven-impl   spec-from-scratch + extensive test suite (largest)
#
# Bundles span the full architecture range:
#   - foundation               standard, full
#   - amplifier-dev            standard + dev tooling (heaviest)
#   - exp-lean-foundation      84% token-cut variant
#   - exp-lean-amplifier-dev   71% token-cut variant
#   - build-up-foundation      agent-router architecture (parent has only todo + delegate)
#
# Run:
#   amplifier-eval-harness run --config configs/cross-anthropic.yaml

profile: ../profiles/eval-base.yaml.tmpl

parallelism: 2
launch_timeout_s: 600
exec_timeout_s: 1500

keep_dtu_on_failure: true
keep_dtu_on_success: false

# Anthropic-primary overlay: opus 4.7 priority 1, routing.matrix=balanced
# (which itself routes anthropic for general/coding/reasoning roles).
settings_overlay: ../settings/default-providers.yaml

ecosystem_overrides:
  - repo: amplifier-foundation
    local_path: ../../amplifier-foundation/

bundles:
  - name: foundation
    source: git+https://github.com/microsoft/amplifier-foundation@main
  - name: amplifier-dev
    source: git+https://github.com/microsoft/amplifier-foundation@main#subdirectory=bundles/amplifier-dev.yaml
  - name: exp-lean-foundation
    source: git+https://github.com/microsoft/amplifier-foundation@main#subdirectory=experiments/exp-lean/exp-lean-foundation.md
  - name: exp-lean-amplifier-dev
    source: git+https://github.com/microsoft/amplifier-foundation@main#subdirectory=experiments/exp-lean/exp-lean-amplifier-dev.md
  - name: build-up-foundation
    source: git+https://github.com/microsoft/amplifier-foundation@main#subdirectory=experiments/build-up/build-up-foundation.md

scenarios:
  - explain-repo
  - fix-failing-test
  - spec-driven-impl

runs_per_combo: 1
